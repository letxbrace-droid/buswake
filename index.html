<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#00C853">
  <meta name="description" content="Organisation de matchs de foot à 5 — Cap Saclay · Dépôt RATP">
  <title>Cap Saclay Five</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== DESIGN SYSTEM V2 — ULTRA PREMIUM ===== */
    :root {
      --orange: #00C853;
      --orange2: #69F0AE;
      --orange-dark: #00952F;
      --orange-glow: rgba(0,200,83,.4);
      --orange-glow-soft: rgba(0,200,83,.12);
      --bg: #060608;
      --surface: #0C0C13;
      --card: #111119;
      --card2: #171721;
      --border: #1C1C2A;
      --border-light: #262636;
      --text: #FFFFFF;
      --text-sec: #6060A0;
      --text-muted: #32324A;
      --green: #00E676;
      --green-glow: rgba(0,230,118,.3);
      --red: #FF1744;
      --blue: #00B0FF;
      --gold: #FFD700;
      --gold-glow: rgba(255,215,0,.3);
      --silver: #90A4AE;
      --bronze: #A05000;
      --nav-h: 72px;
      --top-h: 58px;
      --r: 14px;
      --r-sm: 10px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
    }

    /* Fond avec orbes de couleur */
    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 70% 50% at 85% 5%, rgba(0,200,83,.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 5% 90%, rgba(0,150,60,.04) 0%, transparent 55%);
      pointer-events:none; z-index:0;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:2px; }

    /* ===== AUTH ===== */
    #auth-wrap {
      position:fixed; inset:0; z-index:100;
      background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center;
      padding:20px 20px 48px;
      padding-top:max(env(safe-area-inset-top, 0px) + 24px, 28px);
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overflow-x:hidden;
    }
    /* Spacers flex qui centrent le contenu quand il tient dans l'écran,
       et s'écrasent quand le contenu déborde pour ne pas couper le haut */
    #auth-wrap::before, #auth-wrap::after {
      content:''; flex:1; min-height:12px; pointer-events:none;
    }
    #auth-wrap.hidden { display:none; }

    .auth-logo {
      font-family:'Oswald',sans-serif;
      font-size:clamp(32px, 9vw, 52px); font-weight:700;
      color:var(--orange); letter-spacing:clamp(1px, 0.5vw, 3px);
      margin-bottom:6px;
      filter:drop-shadow(0 0 16px var(--orange-glow));
      animation:logoPulse 3s ease-in-out infinite, authLogoIn .6s cubic-bezier(0.34,1.45,0.64,1) both;
      white-space:nowrap;
    }
    @keyframes logoPulse {
      0%,100% { filter:drop-shadow(0 0 16px var(--orange-glow)); }
      50% { filter:drop-shadow(0 0 36px var(--orange)) brightness(1.15); }
    }
    @keyframes authLogoIn {
      from { opacity:0; transform:translateY(-20px) scale(.9); }
      to   { opacity:1; transform:none; }
    }

    .auth-sub {
      color:var(--text-sec); font-size:13px; margin-bottom:36px;
      text-align:center; letter-spacing:.5px;
      animation:authLogoIn .6s cubic-bezier(0.34,1.45,0.64,1) both;
      animation-delay:.08s;
    }

    /* Carte auth — glassmorphism */
    .auth-card {
      background:rgba(15,15,22,.88);
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      border:1px solid var(--border-light);
      border-radius:24px;
      padding:26px 22px;
      width:100%; max-width:390px;
      box-shadow:
        0 0 0 1px var(--orange-glow-soft),
        0 32px 80px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.07);
      animation:authCardIn .55s cubic-bezier(0.34,1.45,0.64,1) both;
      animation-delay:.1s;
    }
    @keyframes authCardIn {
      from { opacity:0; transform:translateY(28px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    /* ===== TOGGLE ANIMÉ ===== */
    .auth-toggle {
      position:relative;
      display:flex;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      padding:4px;
      margin-bottom:26px;
      overflow:hidden;
    }
    .toggle-pill {
      position:absolute;
      top:4px; left:4px;
      width:calc(50% - 4px);
      height:calc(100% - 8px);
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      border-radius:10px;
      transition:transform .38s cubic-bezier(0.34,1.45,0.64,1);
      box-shadow:0 4px 18px var(--orange-glow);
    }
    .auth-toggle.register .toggle-pill { transform:translateX(100%); }
    .auth-tab {
      flex:1; z-index:1; position:relative;
      padding:12px 8px;
      border:none; background:transparent;
      color:var(--text-sec);
      font-family:'Inter',sans-serif;
      font-size:14px; font-weight:600;
      cursor:pointer;
      transition:color .25s;
      letter-spacing:.3px;
    }
    .auth-tab.active { color:#fff; }

    /* ===== FORM ===== */
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block; font-size:11px;
      color:var(--text-sec); margin-bottom:7px;
      font-weight:600; letter-spacing:1px; text-transform:uppercase;
    }
    .form-group input, .form-group select {
      width:100%; padding:13px 15px;
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:var(--r-sm);
      color:var(--text); font-family:'Inter',sans-serif;
      font-size:15px; outline:none;
      transition:border-color .2s, box-shadow .2s, background .2s;
      -webkit-appearance:none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color:var(--orange);
      background:rgba(255,85,0,.05);
      box-shadow:0 0 0 3px rgba(255,85,0,.18), 0 0 16px rgba(255,85,0,.12), 0 4px 18px rgba(0,0,0,.25);
    }
    .form-group input:focus::placeholder { opacity:.4; transform:translateX(4px); transition:all .2s; }

    /* ===== MULTI-STEP REGISTRATION ===== */
    .reg-progress-bar { height:3px; background:var(--border); border-radius:2px; margin-bottom:18px; overflow:hidden; }
    .reg-progress-fill { height:100%; background:linear-gradient(90deg,var(--orange),var(--orange2)); border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px var(--orange-glow); }
    .reg-step-labels { display:flex; justify-content:space-between; margin-bottom:20px; }
    .rsl { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text-muted); transition:color .3s; }
    .rsl.active { color:var(--orange); }
    .reg-step { animation-fill-mode:both; }
    @keyframes regSlideInR { from { opacity:0; transform:translateX(36px); } to { opacity:1; transform:none; } }
    @keyframes regSlideInL { from { opacity:0; transform:translateX(-36px); } to { opacity:1; transform:none; } }
    .reg-step.slide-in-r { animation:regSlideInR .28s cubic-bezier(.25,.46,.45,.94); }
    .reg-step.slide-in-l { animation:regSlideInL .28s cubic-bezier(.25,.46,.45,.94); }

    /* Sliders STEP 3 — Premium vert fluo */
    .reg-stats-list { display:flex; flex-direction:column; gap:14px; margin:14px 0 20px; }
    .rsi-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
    .rsi-name { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-sec); }
    .rsi-val { font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; color:var(--green); min-width:32px; text-align:right; }
    .reg-stat-slider { -webkit-appearance:none; appearance:none; width:100%; height:5px; border-radius:3px; outline:none; cursor:pointer; }
    .reg-stat-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 0 0 3px var(--green), 0 0 18px var(--green-glow), 0 2px 8px rgba(0,0,0,.5); cursor:pointer; transition:transform .2s; }
    .reg-stat-slider::-webkit-slider-thumb:active { transform:scale(1.3); }
    .reg-stat-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid var(--green); box-shadow:0 0 12px var(--green-glow); }

    /* FUT card mini preview */
    .reg-fut-preview { display:flex; justify-content:center; margin-bottom:8px; }
    .reg-fut-preview .fut-card-v3 { transform:scale(.62); transform-origin:top center; margin-bottom:-105px; }
    .form-group select option { background:#111; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ===== BOUTON PRIMAIRE avec brillance ===== */
    .btn-primary {
      position:relative; overflow:hidden;
      width:100%; padding:15px;
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      border:none; border-radius:var(--r-sm);
      color:#fff; font-family:'Oswald',sans-serif;
      font-size:16px; font-weight:700; letter-spacing:1.5px;
      cursor:pointer;
      transition:transform .15s, box-shadow .2s;
      box-shadow:0 6px 26px var(--orange-glow), 0 2px 8px rgba(0,0,0,.3);
      margin-top:10px;
    }
    .btn-primary::after {
      content:'';
      position:absolute; top:0; left:-120%;
      width:70%; height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform:skewX(-20deg);
      transition:left .55s;
    }
    .btn-primary:hover::after { left:150%; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 36px var(--orange-glow); }
    .btn-primary:active { transform:scale(.97); }

    .auth-error { color:var(--red); font-size:13px; margin-top:12px; text-align:center; min-height:20px; }

    /* ===== SLIDERS CUSTOM V3 — PREMIUM ===== */
    .atouts-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .atout-item label { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-sec); font-weight:600; letter-spacing:.8px; text-transform:uppercase; margin-bottom:6px; }
    .atout-item label span.val {
      color:var(--orange); font-weight:700; font-size:16px;
      font-family:'Oswald',sans-serif; min-width:28px; text-align:right;
      transition:color .2s;
    }
    .atout-item input[type=range] {
      -webkit-appearance:none; appearance:none;
      width:100%; height:6px; border-radius:3px;
      outline:none; cursor:pointer;
      background:linear-gradient(90deg, var(--orange) 65%, var(--border) 65%);
    }
    .atout-item input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; appearance:none;
      width:22px; height:22px; border-radius:50%;
      background:#fff;
      box-shadow:0 0 0 3px var(--orange), 0 0 16px var(--orange-glow), 0 2px 8px rgba(0,0,0,.5);
      cursor:pointer;
      transition:transform .22s cubic-bezier(0.34,1.45,0.64,1), box-shadow .2s;
    }
    .atout-item input[type=range]::-webkit-slider-thumb:active {
      transform:scale(1.35);
      box-shadow:0 0 0 4px var(--orange), 0 0 26px var(--orange-glow), 0 2px 8px rgba(0,0,0,.5);
    }
    .atout-item input[type=range]::-moz-range-thumb {
      width:20px; height:20px; border-radius:50%;
      background:#fff; border:3px solid var(--orange);
      box-shadow:0 0 14px var(--orange-glow);
    }
    .atout-item input[type=range]:focus-visible { outline:none; }

    /* ===== APP SHELL ===== */
    #app { display:flex; flex-direction:column; height:100%; position:relative; z-index:1; }
    #app.hidden { display:none; }

    #topbar {
      height:var(--top-h);
      background:rgba(12,12,19,.9);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:space-between;
      padding:0 18px; flex-shrink:0;
    }
    .top-logo {
      font-family:'Oswald',sans-serif;
      font-size:clamp(16px, 4.5vw, 22px); font-weight:700;
      color:var(--orange); letter-spacing:clamp(0.5px, 0.3vw, 1.5px);
      white-space:nowrap; flex-shrink:0;
      text-shadow:0 0 14px rgba(255,85,0,.4);
    }
    .top-actions { display:flex; gap:10px; align-items:center; }
    .top-xp {
      background:rgba(255,85,0,.12);
      border:1px solid rgba(255,85,0,.4);
      border-radius:20px; padding:5px 12px;
      font-size:12px; font-weight:700;
      color:var(--orange);
      box-shadow:0 0 10px rgba(255,85,0,.15);
    }
    .btn-icon {
      width:36px; height:36px; border:none;
      background:var(--card); border-radius:9px;
      color:var(--text-sec); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:17px; border:1px solid var(--border);
      transition:border-color .2s, color .2s;
    }
    .btn-icon:hover { border-color:var(--red); color:var(--red); }

    #screens { flex:1; overflow:hidden; position:relative; }
    .screen { position:absolute; inset:0; overflow-y:auto; padding:16px 16px calc(var(--nav-h) + 16px); display:none; }
    .screen.active { display:block; animation:fadeIn .22s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    /* ===== BOTTOM NAV ===== */
    #bottom-nav {
      height:var(--nav-h);
      background:rgba(12,12,19,.95);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:space-around;
      flex-shrink:0;
      padding-bottom:env(safe-area-inset-bottom,0);
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column;
      align-items:center; gap:3px;
      border:none; background:transparent;
      color:var(--text-muted); cursor:pointer;
      padding:6px 0 4px; transition:color .18s;
    }
    .nav-icon-wrap {
      width:46px; height:30px;
      display:flex; align-items:center; justify-content:center;
      border-radius:15px;
      transition:background .2s, transform .18s;
    }
    .nav-btn.active { color:var(--orange); }
    .nav-btn.active .nav-icon-wrap {
      background:var(--orange-glow-soft);
      transform:scale(1.06);
    }
    .nav-btn svg {
      width:22px; height:22px; fill:currentColor;
      transition:filter .2s;
    }
    .nav-btn.active svg { filter:drop-shadow(0 0 4px var(--orange-glow)); }
    .nav-btn span {
      font-size:9px; font-weight:700;
      letter-spacing:.5px; text-transform:uppercase;
    }

    /* ===== COMMON COMPONENTS ===== */
    .section-title {
      font-family:'Oswald',sans-serif; font-size:19px; font-weight:700;
      color:var(--text); margin-bottom:12px; letter-spacing:.5px;
      display:flex; align-items:center; gap:8px;
    }
    .badge-dot {
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--orange); color:#fff; border-radius:10px;
      min-width:18px; height:18px; font-size:10px; font-weight:700; padding:0 5px;
    }
    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); padding:16px; margin-bottom:12px;
    }
    .card-hover { cursor:pointer; transition:border-color .2s, background .2s, transform .15s; }
    .card-hover:hover { border-color:var(--orange); background:var(--card2); transform:translateY(-1px); }
    .card-hover:active { transform:scale(.99); }

    .tag { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; }
    .tag-sondage { background:rgba(0,176,255,.12); color:#00B0FF; border:1px solid rgba(0,176,255,.25); }
    .tag-confirme { background:rgba(0,230,118,.12); color:#00E676; border:1px solid rgba(0,230,118,.25); }
    .tag-termine { background:rgba(60,60,90,.2); color:var(--text-sec); border:1px solid var(--border); }

    .empty-state { text-align:center; padding:44px 20px; color:var(--text-muted); }
    .empty-state .icon { font-size:52px; margin-bottom:14px; }
    .empty-state p { font-size:14px; line-height:1.7; }

    .btn-sm {
      padding:9px 16px; border:none; border-radius:9px;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all .2s; letter-spacing:.3px;
    }
    .btn-orange {
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      color:#fff;
      box-shadow:0 4px 14px var(--orange-glow);
    }
    .btn-orange:hover { transform:translateY(-1px); box-shadow:0 6px 20px var(--orange-glow); }
    .btn-outline { background:transparent; border:1px solid var(--border-light); color:var(--text-sec); }
    .btn-outline:hover { border-color:var(--orange); color:var(--orange); }
    .btn-green { background:linear-gradient(135deg, #00C853, #00E676); color:#000; box-shadow:0 4px 14px var(--green-glow); }
    .btn-red { background:linear-gradient(135deg, #B71C1C, var(--red)); color:#fff; }

    .divider { height:1px; background:var(--border); margin:16px 0; }

    .loader { display:flex; justify-content:center; padding:44px; }
    .spinner {
      width:34px; height:34px;
      border:3px solid var(--border);
      border-top-color:var(--orange);
      border-radius:50%;
      animation:spin .75s linear infinite;
      box-shadow:0 0 12px var(--orange-glow);
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ===== HOME SCREEN ===== */
    .hero-match {
      background:linear-gradient(135deg, #1A1520, #0D0A12);
      border:1px solid rgba(255,85,0,.5);
      border-radius:18px; padding:20px;
      margin-bottom:16px; position:relative; overflow:hidden;
      box-shadow:0 0 30px rgba(255,85,0,.1), inset 0 1px 0 rgba(255,85,0,.2);
    }
    .hero-match::before {
      content:''; position:absolute; top:-50px; right:-50px;
      width:180px; height:180px;
      background:radial-gradient(circle, rgba(255,85,0,.18), transparent 70%);
      pointer-events:none;
    }
    .hero-label { font-size:11px; color:var(--orange); font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .hero-date { font-family:'Oswald',sans-serif; font-size:30px; font-weight:700; color:var(--text); line-height:1.1; margin-bottom:4px; }
    .hero-lieu { font-size:14px; color:var(--text-sec); margin-bottom:16px; }
    .hero-players { display:flex; align-items:center; gap:8px; }
    .player-avatars { display:flex; }
    .player-avatar {
      width:32px; height:32px; border-radius:50%;
      background:var(--card2); border:2px solid var(--bg);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:var(--orange);
      font-family:'Oswald',sans-serif; margin-left:-8px;
      box-shadow:0 0 8px rgba(255,85,0,.3);
    }
    .player-avatar:first-child { margin-left:0; }
    .player-count { font-size:13px; color:var(--text-sec); }

    .poll-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); overflow:hidden; margin-bottom:12px;
      cursor:pointer; transition:all .2s;
    }
    .poll-card:hover { border-color:rgba(255,85,0,.5); background:var(--card2); transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
    .poll-card-header { padding:14px 16px 10px; display:flex; justify-content:space-between; align-items:flex-start; }
    .poll-card-title { font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; }
    .poll-card-sub { font-size:12px; color:var(--text-sec); margin-top:2px; }
    .poll-creneaux { padding:0 16px 14px; display:flex; flex-direction:column; gap:6px; }
    .creneau-preview {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 12px; background:var(--surface); border-radius:9px;
      font-size:13px; border:1px solid var(--border);
    }
    .creneau-preview .votes { color:var(--orange); font-weight:700; font-size:12px; }

    /* ===== MODAL BOTTOM SHEET ===== */
    .modal-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,.75);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      display:flex; flex-direction:column;
    }
    .modal-overlay.hidden { display:none; }
    .modal-sheet {
      background:var(--surface);
      border-radius:22px 22px 0 0;
      border-top:1px solid var(--border-light);
      margin-top:auto; max-height:92vh;
      overflow-y:auto;
      padding-bottom:env(safe-area-inset-bottom,0);
      animation:sheetUp .3s cubic-bezier(0.22,1,0.36,1);
      box-shadow:0 -8px 40px rgba(0,0,0,.5);
    }
    @keyframes sheetUp { from { transform:translateY(60%); opacity:0; } to { transform:none; opacity:1; } }
    .modal-handle { width:38px; height:4px; background:var(--border-light); border-radius:2px; margin:14px auto 0; }
    .modal-header { padding:16px 20px 0; display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; }
    .modal-close {
      width:34px; height:34px; border:none;
      background:var(--card); border-radius:9px;
      color:var(--text-sec); cursor:pointer;
      font-size:16px; display:flex;
      align-items:center; justify-content:center;
      border:1px solid var(--border);
      transition:all .2s;
    }
    .modal-close:hover { border-color:var(--red); color:var(--red); }
    .modal-body { padding:16px 20px 24px; }
    .section-sub { font-size:11px; color:var(--text-sec); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }

    /* Vote créneaux */
    .creneau-vote {
      background:var(--card); border:2px solid var(--border);
      border-radius:13px; padding:14px; margin-bottom:8px;
      cursor:pointer; transition:all .22s;
      display:flex; justify-content:space-between; align-items:center;
    }
    .creneau-vote:hover { border-color:rgba(255,85,0,.4); background:var(--card2); }
    .creneau-vote.voted { border-color:var(--orange); background:rgba(255,85,0,.07); box-shadow:0 0 14px rgba(255,85,0,.1); }
    .creneau-vote.top { border-color:var(--green); background:rgba(0,230,118,.05); box-shadow:0 0 14px rgba(0,230,118,.08); }
    .creneau-vote .info { flex:1; }
    .creneau-vote .date-str { font-weight:600; font-size:15px; }
    .creneau-vote .lieu-str { font-size:12px; color:var(--text-sec); margin-top:2px; }
    .creneau-vote .vote-count { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .vote-num { font-family:'Oswald',sans-serif; font-size:24px; font-weight:700; color:var(--orange); text-shadow:0 0 10px var(--orange-glow); }
    .vote-label { font-size:10px; color:var(--text-sec); text-transform:uppercase; letter-spacing:.5px; }
    .vote-check { width:22px; height:22px; border-radius:50%; background:var(--orange); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; margin-left:8px; flex-shrink:0; box-shadow:0 0 8px var(--orange-glow); }

    /* Joueurs inscrits */
    .joueurs-list { display:flex; flex-wrap:wrap; gap:8px; }
    .joueur-chip {
      display:flex; align-items:center; gap:6px;
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:6px 12px; font-size:13px;
    }
    .joueur-chip .j-avatar {
      width:22px; height:22px; border-radius:50%;
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:700;
    }

    /* Liste joueurs avec distance */
    .jd-list { display:flex; flex-direction:column; gap:6px; }
    .jd-row {
      display:flex; align-items:center; gap:10px;
      padding:9px 12px; border-radius:11px;
      background:var(--card); border:1px solid var(--border);
      transition:opacity .2s;
    }
    .jd-row.hidden { display:none !important; }
    .jd-row.jd-bench { opacity:.55; }
    .jd-rank { min-width:22px; font-size:11px; font-weight:700; color:var(--text-muted); font-family:Oswald,sans-serif; text-align:center; }
    .jd-info { flex:1; min-width:0; }
    .jd-pseudo { font-size:13px; font-weight:600; color:var(--text); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .jd-sub { font-size:11px; color:var(--text-muted); margin-top:1px; display:block; }
    .jd-dist-pill { font-size:11px; font-weight:600; color:var(--text-sec); background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:20px; padding:3px 8px; white-space:nowrap; flex-shrink:0; }
    .jd-bench-sep { text-align:center; font-size:10px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; padding:6px 0 4px; }
    .dept-filter-wrap { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .dept-filter-input { flex:1; font-size:13px; padding:8px 12px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); outline:none; }
    .dept-filter-input:focus { border-color:var(--orange); }

    /* Équipes */
    .equipe-block { background:var(--card); border-radius:13px; padding:14px; margin-bottom:10px; border-left:4px solid var(--orange); }
    .equipe-nom { font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
    .equipe-joueurs { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

    /* Score */
    .score-display { display:flex; align-items:center; justify-content:center; gap:16px; margin:18px 0; }
    .score-team { text-align:center; }
    .score-num { font-family:'Oswald',sans-serif; font-size:56px; font-weight:700; color:var(--orange); line-height:1; text-shadow:0 0 20px var(--orange-glow); }
    .score-name { font-size:12px; color:var(--text-sec); margin-top:4px; }
    .score-sep { font-family:'Oswald',sans-serif; font-size:36px; color:var(--text-muted); }

    /* ===== CREATE MATCH ===== */
    .create-form { padding:0; }
    .creneau-builder {
      background:var(--card); border:1px solid var(--border);
      border-radius:13px; padding:14px; margin-bottom:8px; position:relative;
    }
    .remove-creneau { position:absolute; top:10px; right:10px; background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:18px; transition:color .2s; }
    .remove-creneau:hover { color:var(--red); }
    .add-creneau-btn {
      width:100%; padding:13px;
      border:2px dashed var(--border); border-radius:var(--r-sm);
      background:transparent; color:var(--text-sec);
      cursor:pointer; font-size:14px; transition:all .2s; font-family:'Inter',sans-serif;
    }
    .add-creneau-btn:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,85,0,.04); }
    .input-field {
      width:100%; padding:11px 13px;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:9px; color:var(--text);
      font-family:'Inter',sans-serif; font-size:14px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .input-field:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,85,0,.1); }
    .input-label { font-size:11px; color:var(--text-sec); font-weight:600; letter-spacing:.8px; text-transform:uppercase; margin-bottom:5px; display:block; }

    /* ===== FUT CARD V3 — FIFA STYLE ===== */
    .fut-card-wrap { display:flex; justify-content:center; margin-bottom:20px; }
    .fut-card-v3 {
      position:relative; width:220px;
      background:linear-gradient(160deg, #E8D48B 0%, #C8A830 20%, #F0D060 40%, #B89020 60%, #D8B840 80%, #A07810 100%);
      border-radius:18px 18px 12px 12px;
      box-shadow:0 12px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(255,200,50,.3), inset 0 1px 0 rgba(255,255,255,.4);
      overflow:hidden; font-family:'Oswald',sans-serif;
      border:2px solid rgba(220,180,40,.6);
    }
    .fut-card-v3::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,255,255,.2) 0%, transparent 60%),
        repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(255,200,50,.04) 18px, rgba(255,200,50,.04) 19px);
      pointer-events:none; z-index:1;
    }
    /* Top section */
    .fc3-top {
      position:relative; height:165px;
      background:linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,.05) 100%);
      overflow:hidden;
    }
    .fc3-meta {
      position:absolute; left:12px; top:12px; z-index:3;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }
    .fc3-overall {
      font-size:40px; font-weight:700; line-height:1;
      color:#1A1000; text-shadow:0 2px 4px rgba(255,200,50,.5);
    }
    .fc3-pos {
      font-size:13px; font-weight:600; color:#1A1000; letter-spacing:.5px;
    }
    .fc3-badge-row { display:flex; flex-direction:column; align-items:center; gap:4px; margin-top:4px; }
    .fc3-photo-zone {
      position:absolute; right:0; top:0; bottom:0; left:40px;
      display:flex; align-items:flex-end; justify-content:center;
      z-index:2;
    }
    .fc3-photo {
      width:160px; height:160px; object-fit:cover;
      object-position:center top;
      filter:drop-shadow(-4px 0 12px rgba(0,0,0,.4));
    }
    .fc3-photo-placeholder {
      width:100px; height:140px;
      display:flex; align-items:center; justify-content:center;
      font-size:72px; opacity:.6; align-self:center;
    }
    .fc3-upload-btn {
      position:absolute; bottom:8px; right:8px; z-index:4;
      background:rgba(0,0,0,.5); border:1px solid rgba(255,200,50,.4);
      border-radius:8px; padding:4px 8px; font-size:10px; color:#FFD050;
      cursor:pointer; font-family:'Inter',sans-serif; font-weight:600;
      backdrop-filter:blur(4px);
    }
    /* Bottom section */
    .fc3-bottom {
      position:relative; z-index:2;
      background:linear-gradient(180deg, rgba(210,160,20,.9) 0%, rgba(180,130,10,.95) 100%);
      border-top:1px solid rgba(255,200,50,.5);
      padding:6px 10px 10px;
    }
    .fc3-name {
      font-size:20px; font-weight:700; color:#1A0E00;
      text-align:center; letter-spacing:1.5px;
      text-shadow:0 1px 2px rgba(255,200,50,.3);
      margin-bottom:5px;
    }
    .fc3-divider {
      height:1px; background:rgba(0,0,0,.25); margin:0 0 6px;
    }
    .fc3-stats {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:2px 8px;
    }
    .fc3-stat {
      display:flex; align-items:baseline; gap:4px; justify-content:center;
    }
    .fc3-stat .sn { font-size:14px; font-weight:700; color:#1A0E00; }
    .fc3-stat .sl { font-size:9px; font-weight:600; color:#5A3A00; letter-spacing:.5px; }
    /* Glow rare effect */
    .fut-card-v3.rare::before {
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,255,255,.3) 0%, transparent 60%),
        repeating-linear-gradient(-45deg, transparent, transparent 12px, rgba(180,120,0,.08) 12px, rgba(180,120,0,.08) 13px);
    }

    .atout-bar-wrap { margin-bottom:10px; }
    .atout-bar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
    .atout-bar-label span:last-child { color:var(--orange); font-weight:700; }
    .atout-bar-bg { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .atout-bar-fill {
      height:100%;
      background:linear-gradient(90deg, var(--orange-dark), var(--orange), var(--orange2));
      border-radius:3px; transition:width .5s cubic-bezier(0.22,1,0.36,1);
      box-shadow:0 0 8px var(--orange-glow);
    }

    .rank-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,85,0,.1); border:1px solid rgba(255,85,0,.4);
      border-radius:20px; padding:7px 16px;
      font-size:14px; font-weight:700; color:var(--orange);
      margin-bottom:16px;
      box-shadow:0 0 14px rgba(255,85,0,.12);
    }
    .badges-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .badge-item {
      background:var(--card); border:1px solid var(--border);
      border-radius:11px; padding:10px 6px; text-align:center;
      transition:all .2s;
    }
    .badge-item.unlocked { border-color:rgba(255,215,0,.4); background:rgba(255,215,0,.07); }
    .badge-item .b-icon { font-size:26px; margin-bottom:4px; }
    .badge-item .b-name { font-size:10px; color:var(--text-sec); font-weight:600; letter-spacing:.3px; }
    .badge-item.unlocked .b-name { color:var(--gold); }
    .badge-item.locked { opacity:.3; filter:grayscale(1); }

    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .stat-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:14px 8px; text-align:center;
    }
    .stat-box .sv { font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; color:var(--orange); text-shadow:0 0 12px var(--orange-glow); }
    .stat-box .sl { font-size:10px; color:var(--text-sec); font-weight:600; letter-spacing:.3px; margin-top:2px; }
    .edit-profile-btn {
      width:100%; padding:13px;
      background:var(--card2); border:1px solid var(--border-light);
      border-radius:var(--r-sm); color:var(--text-sec);
      font-family:'Inter',sans-serif; font-size:14px; font-weight:500;
      cursor:pointer; transition:all .2s; margin-top:4px;
    }
    .edit-profile-btn:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,85,0,.06); }

    /* ===== CLASSEMENT ===== */
    .podium { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin-bottom:28px; height:150px; }
    .podium-item { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; flex:1; max-width:115px; }
    .podium-avatar {
      width:46px; height:46px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:'Oswald',sans-serif; font-size:18px; font-weight:700;
      color:#fff; margin-bottom:5px;
    }
    .podium-name { font-size:11px; font-weight:700; color:var(--text); text-align:center; width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .podium-xp { font-size:10px; color:var(--text-sec); margin-top:1px; }
    .podium-block {
      width:100%; border-radius:10px 10px 0 0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Oswald',sans-serif; font-size:30px; font-weight:700; color:#fff;
    }
    .podium-1 .podium-block { background:linear-gradient(180deg, #FFD700, #F57F17); height:95px; box-shadow:0 0 20px rgba(255,215,0,.3); }
    .podium-2 .podium-block { background:linear-gradient(180deg, #90A4AE, #546E7A); height:72px; }
    .podium-3 .podium-block { background:linear-gradient(180deg, #A05000, #6D3500); height:58px; }
    .podium-1 .podium-avatar { background:linear-gradient(135deg, #FFD700, #F57F17); box-shadow:0 0 16px rgba(255,215,0,.4); }
    .podium-2 .podium-avatar { background:linear-gradient(135deg, #90A4AE, #546E7A); }
    .podium-3 .podium-avatar { background:linear-gradient(135deg, #A05000, #6D3500); }

    .leaderboard-list { display:flex; flex-direction:column; gap:8px; }
    .lb-item {
      background:var(--card); border:1px solid var(--border);
      border-radius:13px; padding:12px 14px;
      display:flex; align-items:center; gap:12px;
      transition:all .2s;
    }
    .lb-item:hover { border-color:var(--border-light); background:var(--card2); }
    .lb-item.me { border-color:rgba(255,85,0,.4); background:rgba(255,85,0,.06); box-shadow:0 0 16px rgba(255,85,0,.08); }
    .lb-rank { font-family:'Oswald',sans-serif; font-size:19px; font-weight:700; color:var(--text-muted); min-width:28px; }
    .lb-avatar {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg, var(--orange-dark), var(--orange));
      display:flex; align-items:center; justify-content:center;
      font-family:'Oswald',sans-serif; font-size:15px; font-weight:700;
      color:#fff; flex-shrink:0; box-shadow:0 0 10px var(--orange-glow);
    }
    .lb-info { flex:1; }
    .lb-pseudo { font-weight:600; font-size:14px; }
    .lb-detail { font-size:11px; color:var(--text-sec); margin-top:2px; }
    .lb-xp { font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; color:var(--orange); text-shadow:0 0 10px var(--orange-glow); }

    /* ===== TOAST ===== */
    #toast-wrap {
      position:fixed; top:16px; left:50%; transform:translateX(-50%);
      z-index:999; display:flex; flex-direction:column; gap:8px;
      pointer-events:none; width:calc(100% - 32px); max-width:400px;
    }
    .toast {
      background:rgba(22,22,33,.95);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border-light);
      border-radius:14px; padding:13px 16px;
      font-size:14px; font-weight:500;
      animation:slideDown .28s cubic-bezier(0.22,1,0.36,1);
      display:flex; align-items:center; gap:10px;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .toast.success { border-color:rgba(0,230,118,.4); background:rgba(0,30,12,.9); }
    .toast.error { border-color:rgba(255,23,68,.4); background:rgba(30,0,8,.9); }
    .toast.levelup {
      border-color:rgba(255,215,0,.5); background:rgba(30,20,0,.9);
      font-family:'Oswald',sans-serif; font-size:17px; letter-spacing:.3px;
      box-shadow:0 8px 32px rgba(255,215,0,.15);
    }
    .toast-icon { font-size:20px; flex-shrink:0; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-14px) scale(.95); } to { opacity:1; transform:none; } }

    /* ===== LOADING ===== */
    #loading-screen {
      position:fixed; inset:0; z-index:300;
      background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
    }
    #loading-screen.hidden { display:none; }
    .loading-logo {
      font-family:'Oswald',sans-serif; font-size:clamp(28px, 8vw, 42px); font-weight:700;
      color:var(--orange); letter-spacing:clamp(1px, 0.5vw, 3px);
      text-shadow:0 0 24px var(--orange-glow); white-space:nowrap;
      animation:logoPulse 2s ease-in-out infinite;
    }

    /* ===== MISC ===== */
    .pill-tabs { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
    .pill-tab {
      padding:8px 18px; border:1px solid var(--border);
      border-radius:20px; background:transparent;
      color:var(--text-sec); font-size:13px; font-weight:600;
      cursor:pointer; white-space:nowrap; transition:all .2s;
    }
    .pill-tab.active {
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      border-color:var(--orange); color:#fff;
      box-shadow:0 4px 14px var(--orange-glow);
    }

    .match-list-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); padding:0; overflow:hidden;
      margin-bottom:10px; cursor:pointer; transition:all .2s;
    }
    .match-list-card:hover { border-color:rgba(255,85,0,.4); background:var(--card2); transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
    .mlc-top { padding:14px 16px 10px; display:flex; justify-content:space-between; align-items:flex-start; }
    .mlc-title { font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; }
    .mlc-sub { font-size:12px; color:var(--text-sec); margin-top:3px; }
    .mlc-bottom { padding:10px 16px; background:var(--surface); display:flex; align-items:center; gap:10px; border-top:1px solid var(--border); }
    .mlc-creator { font-size:12px; color:var(--text-sec); }
    .input-row { display:flex; gap:8px; }
    .input-row input { flex:1; }
    .section-actions { display:flex; gap:8px; margin-bottom:14px; }

    /* homme du match */
    .hdm-list { display:flex; flex-direction:column; gap:6px; }
    .hdm-item {
      display:flex; align-items:center; gap:10px;
      padding:11px 13px; background:var(--card);
      border:2px solid var(--border); border-radius:11px;
      cursor:pointer; transition:all .2s;
    }
    .hdm-item:hover { border-color:rgba(255,215,0,.3); background:var(--card2); }
    .hdm-item.selected { border-color:var(--gold); background:rgba(255,215,0,.07); box-shadow:0 0 14px rgba(255,215,0,.1); }
    .hdm-item .hdm-pseudo { flex:1; font-weight:500; }
    .hdm-crown { color:var(--gold); font-size:18px; text-shadow:0 0 10px var(--gold-glow); }

    /* Équipe builder */
    .eq-header { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .eq-emoji { font-size:26px; cursor:pointer; }
    .eq-color-dot { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid var(--border); flex-shrink:0; transition:transform .15s; }
    .eq-color-dot:hover { transform:scale(1.15); }
    .color-picker-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .color-dot { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all .15s; }
    .color-dot:hover { transform:scale(1.1); }
    .color-dot.selected { border-color:#fff; box-shadow:0 0 8px rgba(255,255,255,.3); }
    .assign-list { display:flex; flex-direction:column; gap:4px; margin-top:10px; }
    .assign-item { display:flex; align-items:center; gap:8px; padding:9px 11px; background:var(--surface); border-radius:9px; font-size:13px; border:1px solid var(--border); }
    .assign-item select { margin-left:auto; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:4px 8px; font-size:12px; outline:none; }

    /* Profile edit modal ranges */
    #modal-body input[type=range] {
      -webkit-appearance:none; appearance:none;
      width:100%; height:4px; border-radius:2px;
      outline:none; cursor:pointer; background:var(--border);
    }
    #modal-body input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; appearance:none;
      width:18px; height:18px; border-radius:50%;
      background:#fff; border:3px solid var(--orange);
      box-shadow:0 0 10px var(--orange-glow);
    }

    /* ===== CLUB GRID ===== */
    .club-scroll { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:6px; }
    .club-card {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      padding:8px 4px; background:var(--surface);
      border:1.5px solid var(--border); border-radius:14px;
      cursor:pointer; transition:all .22s cubic-bezier(.25,.8,.25,1);
    }
    .club-card:hover { border-color:rgba(255,255,255,.22); transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.3); }
    .club-card.selected { border-color:var(--orange); background:var(--orange-glow-soft); box-shadow:0 0 14px var(--orange-glow), 0 0 0 2px var(--orange-glow-soft); transform:scale(1.04); }
    .club-card .cn { font-size:9px; font-weight:700; color:var(--text-sec); letter-spacing:.3px; text-align:center; }
    .club-card.selected .cn { color:var(--orange); }

    /* ===== POSTE GRID ===== */
    .poste-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:6px; }
    .poste-btn {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      padding:12px 4px; background:var(--surface);
      border:1.5px solid var(--border); border-radius:11px;
      cursor:pointer; transition:all .18s;
    }
    .poste-btn:hover { border-color:rgba(255,255,255,.2); transform:translateY(-1px); }
    .poste-btn.selected { border-color:var(--orange); background:var(--orange-glow-soft); box-shadow:0 0 10px var(--orange-glow); }
    .poste-btn .p-icon { font-size:22px; }
    .poste-btn .p-abbr { font-family:'Oswald',sans-serif; font-size:13px; font-weight:700; color:var(--text-sec); }
    .poste-btn .p-label { font-size:9px; color:var(--text-muted); font-weight:500; }
    .poste-btn.selected .p-abbr { color:var(--orange); }
    .poste-btn.selected .p-label { color:var(--orange); opacity:.7; }

    /* ===== THEME DOTS ===== */
    .theme-picker { display:flex; gap:6px; align-items:center; }
    .t-dot {
      width:16px; height:16px; border-radius:50%;
      cursor:pointer; border:2px solid transparent;
      transition:all .2s; flex-shrink:0;
    }
    .t-dot:hover { transform:scale(1.15); }
    .t-dot.active { border-color:#fff; box-shadow:0 0 6px currentColor; transform:scale(1.1); }

    /* ===== TOOLTIP SLIDER PREMIUM V3 ===== */
    .slider-wrap { position:relative; padding-top:30px; margin-bottom:2px; }
    .s-tooltip {
      position:absolute; top:0;
      transform:translateX(-50%) scale(1);
      background:linear-gradient(135deg, var(--orange), var(--orange2));
      color:#fff;
      font-size:13px; font-weight:700;
      padding:3px 10px 2px; border-radius:9px;
      pointer-events:none;
      transition:left .06s linear, transform .25s cubic-bezier(0.34,1.45,0.64,1);
      font-family:'Oswald',sans-serif;
      white-space:nowrap;
      box-shadow:0 3px 14px var(--orange-glow);
      letter-spacing:.5px; line-height:1.5;
    }
    .s-tooltip.pop { transform:translateX(-50%) translateY(-4px) scale(1.18); }
    .s-tooltip::after {
      content:''; position:absolute; top:100%; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:var(--orange);
    }

    /* ===== FUT CARD shield + poste ===== */
    .fut-club-shield { display:inline-flex; align-items:center; gap:8px; margin-top:6px; justify-content:center; }
    .fut-poste-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(0,230,118,.15); border:1px solid rgba(0,230,118,.3);
      border-radius:20px; padding:4px 12px;
      font-size:12px; font-weight:700; color:var(--green);
      margin-top:6px;
    }

    /* ===== THEME SECTION in profil ===== */
    .theme-section { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:14px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
    .theme-section .ts-label { font-size:13px; color:var(--text-sec); font-weight:500; flex:1; }
    .theme-section .theme-picker { gap:8px; }
    .theme-section .t-dot { width:22px; height:22px; }

    @media (min-width:480px) {
      .screen { padding:20px 20px calc(var(--nav-h) + 20px); }
    }

    /* ===== GOOGLE AUTH ===== */
    .or-divider {
      display:flex; align-items:center; gap:12px;
      color:var(--text-muted); font-size:11px; font-weight:600;
      letter-spacing:.8px; text-transform:uppercase;
      margin:14px 0;
    }
    .or-divider::before, .or-divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .btn-google {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:13px;
      background:#fff; border:none; border-radius:var(--r-sm);
      color:#3c4043; font-family:'Inter',sans-serif;
      font-size:15px; font-weight:600;
      cursor:pointer;
      transition:transform .15s, box-shadow .2s;
      box-shadow:0 3px 10px rgba(0,0,0,.35);
    }
    .btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.35); }
    .btn-google:active { transform:scale(.97); }
    .btn-google svg { width:20px; height:20px; flex-shrink:0; }

    /* ===== MAP VENUE PICKER ===== */
    .venue-map-wrap { position:relative; border-radius:12px; overflow:hidden; margin-bottom:12px; }
    #venue-map { height:220px; width:100%; border-radius:12px; }
    .venue-map-search {
      position:absolute; top:8px; left:8px; right:8px; z-index:1000;
      display:flex; gap:6px;
    }
    .venue-map-search input {
      flex:1; padding:9px 12px;
      background:rgba(15,15,22,.92); backdrop-filter:blur(8px);
      border:1px solid var(--border-light); border-radius:9px;
      color:var(--text); font-family:'Inter',sans-serif; font-size:13px;
      outline:none;
    }
    .venue-map-search input:focus { border-color:var(--orange); }
    .venue-list {
      max-height:160px; overflow-y:auto;
      border:1px solid var(--border); border-radius:10px;
      margin-bottom:10px;
    }
    .venue-item {
      padding:10px 14px; font-size:13px; cursor:pointer;
      border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .venue-item:last-child { border-bottom:none; }
    .venue-item:hover, .venue-item.selected { background:var(--orange-glow-soft); color:var(--orange); }
    .venue-item .vi-name { font-weight:600; }
    .venue-item .vi-dist { font-size:11px; color:var(--text-sec); margin-top:2px; }
    .map-or-manual {
      display:flex; align-items:center; gap:10px;
      color:var(--text-muted); font-size:11px; margin:8px 0;
    }
    .map-or-manual::before,.map-or-manual::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ===== TERRAIN TACTIQUE ===== */
    .terrain-wrap { display:flex; flex-direction:column; gap:10px; }
    .terrain-mode-bar {
      display:flex; gap:8px; align-items:center;
    }
    .t-mode-btn {
      flex:1; padding:10px 6px; border-radius:22px;
      border:2px solid rgba(0,200,83,.35);
      background:rgba(0,200,83,.06);
      color:var(--text-sec); font-family:Oswald,sans-serif;
      font-size:12px; font-weight:600; cursor:pointer;
      transition:all .22s; letter-spacing:.3px;
    }
    .t-mode-btn.active-auto {
      border-color:var(--orange); background:var(--orange-glow-soft);
      color:#fff; box-shadow:0 0 14px var(--orange-glow);
    }
    .t-mode-btn.active-draft {
      border-color:#7c3aed; background:rgba(124,58,237,.15);
      color:#fff; box-shadow:0 0 14px rgba(124,58,237,.35);
    }
    .t-share-btn {
      width:40px; height:40px; border-radius:10px;
      border:1px solid var(--border); background:var(--card2);
      font-size:18px; cursor:pointer; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }
    /* Pitch background */
    .terrain-field {
      position:relative; border-radius:14px; overflow:hidden;
      background:#071a07;
      border:2px solid rgba(255,255,255,.12);
    }
    .terrain-field::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        repeating-linear-gradient(0deg, transparent 0px, transparent 38px, rgba(255,255,255,.025) 38px, rgba(255,255,255,.025) 39px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 38px, rgba(255,255,255,.02) 38px, rgba(255,255,255,.02) 39px);
    }
    .terrain-half {
      position:relative; z-index:1;
      padding:10px 8px 8px; min-height:140px;
      transition:background .18s;
    }
    .terrain-half.drag-over {
      background:rgba(255,255,255,.06) !important;
      outline:2px dashed var(--orange); outline-offset:-3px;
    }
    .team-banner {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:8px; padding:5px 8px;
      background:rgba(0,0,0,.35); border-radius:8px;
      border-left:3px solid var(--t-color,var(--orange));
      font-family:Oswald,sans-serif; font-size:13px; font-weight:600;
    }
    .team-count {
      font-size:12px; color:var(--text-sec);
      background:rgba(255,255,255,.08); padding:2px 9px; border-radius:10px;
    }
    /* Center stripe */
    .terrain-center-line {
      position:relative; height:34px; z-index:1;
      display:flex; align-items:center; justify-content:center;
    }
    .tcl-line {
      position:absolute; left:0; right:0; top:50%;
      height:1px; background:rgba(255,255,255,.4);
    }
    .tcl-circle {
      width:52px; height:52px; border-radius:50%;
      border:1px solid rgba(255,255,255,.4);
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:rgba(7,26,7,.7);
    }
    .tcl-dot {
      width:7px; height:7px; border-radius:50%;
      background:rgba(255,255,255,.65);
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%); z-index:2;
    }
    /* Mini cards */
    .mini-cards-grid {
      display:flex; flex-wrap:wrap; gap:7px;
      justify-content:center; align-items:flex-start; min-height:60px;
    }
    .mini-cards-row {
      display:flex; flex-wrap:nowrap; gap:7px; overflow-x:auto;
      padding:4px 2px; -webkit-overflow-scrolling:touch;
    }
    .drop-hint {
      font-size:12px; color:rgba(255,255,255,.2);
      font-style:italic; padding:18px 8px; text-align:center; width:100%;
    }
    .mini-card {
      width:54px; border-radius:7px; overflow:hidden;
      cursor:pointer; user-select:none; touch-action:none;
      display:flex; flex-direction:column; align-items:center;
      padding:4px 3px 4px; gap:2px;
      transition:transform .14s, box-shadow .14s;
      position:relative;
    }
    .mini-card:active { transform:scale(0.92); }
    .mini-card.dragging { opacity:0.25; }
    .mini-card.gold {
      background:linear-gradient(160deg,#5c3d0e 0%,#b8832a 35%,#e8c55a 55%,#b8832a 75%,#5c3d0e 100%);
      box-shadow:0 2px 10px rgba(200,151,58,.5);
    }
    .mini-card.silver {
      background:linear-gradient(160deg,#2e2e3e 0%,#7a7a92 35%,#b8b8cc 55%,#7a7a92 75%,#2e2e3e 100%);
      box-shadow:0 2px 8px rgba(120,120,160,.35);
    }
    .mini-card.bronze {
      background:linear-gradient(160deg,#3c2008 0%,#7a4a18 35%,#b86e30 55%,#7a4a18 75%,#3c2008 100%);
      box-shadow:0 2px 8px rgba(120,80,30,.35);
    }
    .mc-overall {
      font-family:Oswald,sans-serif; font-size:16px; font-weight:700;
      color:#fff; line-height:1; text-shadow:0 1px 4px rgba(0,0,0,.6);
    }
    .mc-avatar {
      width:36px; height:36px; border-radius:4px;
      background:rgba(0,0,0,.3); overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:#fff;
    }
    .mc-name {
      font-family:Oswald,sans-serif; font-size:9px; font-weight:600;
      color:rgba(255,255,255,.92); text-align:center;
      line-height:1; letter-spacing:.3px;
      white-space:nowrap; overflow:hidden; max-width:50px;
      text-overflow:ellipsis;
    }
    /* Bench */
    .bench-area {
      background:var(--card); border:1px dashed var(--border);
      border-radius:12px; padding:10px 10px 8px;
    }
    .bench-area.drag-over { border-color:var(--orange); background:var(--orange-glow-soft); }
    .bench-label {
      font-size:11px; color:var(--text-sec); font-weight:600;
      margin-bottom:8px; letter-spacing:.8px; text-transform:uppercase;
    }
    /* Terrain actions */
    .terrain-actions { display:flex; gap:8px; }
    .terrain-actions .btn-sm { flex:1; }
    /* Player detail overlay */
    .player-detail-popup {
      position:absolute; inset:0; z-index:200;
      background:rgba(0,0,0,.72); display:flex;
      align-items:center; justify-content:center;
      border-radius:inherit;
    }
    .pdp-inner {
      background:var(--card); border-radius:16px;
      padding:16px; width:calc(100% - 40px); max-width:300px;
      border:1px solid var(--border);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .pdp-header {
      display:flex; gap:12px; align-items:center; margin-bottom:14px;
    }
    .pdp-photo {
      width:50px; height:50px; border-radius:10px;
      background:var(--card2); overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:16px; color:var(--text); flex-shrink:0;
    }
    .pdp-name { font-family:Oswald,sans-serif; font-size:18px; font-weight:700; line-height:1.1; }
    .pdp-ovr-chip {
      display:inline-block; margin-top:3px;
      font-size:12px; font-weight:700; padding:2px 10px;
      border-radius:10px; color:#fff;
    }
    .pdp-stat-row {
      display:grid; grid-template-columns:34px 1fr 28px;
      gap:8px; align-items:center; margin-bottom:7px;
    }
    .pdp-stat-label { font-size:11px; font-weight:700; color:var(--text-sec); text-transform:uppercase; }
    .pdp-stat-bar { height:6px; background:var(--card2); border-radius:3px; overflow:hidden; }
    .pdp-stat-bar div { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--orange-dark),var(--orange)); }
    .pdp-stat-val { font-family:Oswald,sans-serif; font-size:13px; font-weight:700; text-align:right; color:var(--text); }
  </style>
</head>
<body>

<!-- Chargement -->
<div id="loading-screen">
  <div class="loading-logo">CAP SACLAY<span style="color:#fff"> FIVE</span></div>
  <div class="spinner"></div>
</div>

<!-- AUTH -->
<div id="auth-wrap" class="hidden">
  <div class="auth-logo">CAP SACLAY<span style="color:#fff"> FIVE</span></div>
  <div class="auth-sub">Foot à 5 · Dépôt RATP</div>
  <div class="auth-card">
    <div class="auth-toggle" id="auth-toggle">
      <div class="toggle-pill"></div>
      <button class="auth-tab active" id="tab-login" onclick="showAuthTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="showAuthTab('register')">Inscription</button>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-pwd" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">SE CONNECTER</button>
      <div class="or-divider">ou</div>
      <button class="btn-google" onclick="doGoogleSignIn()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuer avec Google
      </button>
    </div>

    <!-- Register — 3 étapes -->
    <div id="form-register" style="display:none">
      <!-- Barre de progression -->
      <div class="reg-progress-bar"><div class="reg-progress-fill" id="reg-progress-fill" style="width:33%"></div></div>
      <div class="reg-step-labels">
        <span class="rsl active" id="rsl-1">Identifiants</span>
        <span class="rsl" id="rsl-2">Profil Foot</span>
        <span class="rsl" id="rsl-3">Carte FUT</span>
      </div>

      <!-- Étape 1 — Identifiants -->
      <div class="reg-step" id="reg-step-1">
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="ton@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="reg-pwd" placeholder="••••••" autocomplete="new-password">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Pseudo</label>
            <input type="text" id="reg-pseudo" placeholder="Sur le terrain" maxlength="20" autocomplete="username">
          </div>
          <div class="form-group">
            <label>Code postal</label>
            <input type="tel" id="reg-cp" placeholder="91130" maxlength="5" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="regNextStep(2)">Continuer →</button>
        <div class="or-divider" style="margin:14px 0 10px">ou inscription rapide</div>
        <button class="btn-google" onclick="doGoogleSignIn()">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuer avec Google
        </button>
      </div>

      <!-- Étape 2 — Profil Foot -->
      <div class="reg-step" id="reg-step-2" style="display:none">
        <div class="form-group">
          <label>Équipe préférée</label>
          <input type="hidden" id="reg-equipe" value="PSG">
          <div class="club-scroll" id="reg-club-grid"></div>
        </div>
        <div class="form-group" style="margin-top:16px">
          <label>Ton poste</label>
          <input type="hidden" id="reg-poste" value="attaquant">
          <div class="poste-grid" id="reg-poste-grid"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:18px">
          <button class="btn-sm btn-outline" style="flex:1;padding:14px" onclick="regNextStep(1)">← Retour</button>
          <button class="btn-primary" style="flex:2;margin-top:0" onclick="regNextStep(3)">Suivant →</button>
        </div>
      </div>

      <!-- Étape 3 — Carte FUT (effet Wow) -->
      <div class="reg-step" id="reg-step-3" style="display:none">
        <div class="reg-fut-preview" id="reg-fut-preview"></div>

function noteGlobale(atouts) {
  if (!atouts) return 70;
  const { vitesse=70, dribble=70, frappe=70, defense=70, physique=70 } = atouts;
  return Math.round((vitesse + dribble + frappe + defense + physique) / 5);
}

// Retourne le rang pour un niveau d'XP
function getRang(xp) {
  let rang = RANGS[0];
  for (const r of RANGS) { if (xp >= r.min) rang = r; }
  return rang;
}

// Vérifie et attribue les badges
async function checkBadges(uid, userData) {
  const badges = userData.badges || [];
  const stats = userData.stats || {};
  const matchsJoues = stats.matchsJoues || 0;
  const newBadges = [];

  if (matchsJoues >= 1 && !badges.includes('premier_match')) newBadges.push('premier_match');
  if (matchsJoues >= 5 && !badges.includes('cinq_matchs')) newBadges.push('cinq_matchs');
  if (matchsJoues >= 10 && !badges.includes('dix_matchs')) newBadges.push('dix_matchs');
  if (stats.hommeDuMatch >= 1 && !badges.includes('hdm')) newBadges.push('hdm');

  if (newBadges.length > 0) {
    await updateDoc(doc(db, 'users', uid), { badges: arrayUnion(...newBadges) });
    newBadges.forEach(b => {
      const def = BADGES_DEF.find(x => x.id === b);
      if (def) showToast(`Badge débloqué : ${def.icon} ${def.name}`, 'success');
    });
  }
}

// Ajoute de l'XP et notifie le level-up
async function addXP(uid, amount) {
  const ref = doc(db, 'users', uid);
  const snap = await getDoc(ref);
  const data = snap.data();
  const oldXP = data.xp || 0;
  const newXP = oldXP + amount;
  const oldRang = getRang(oldXP);
  const newRang = getRang(newXP);
  await updateDoc(ref, { xp: increment(amount) });
  if (newRang.min > oldRang.min) {
    showToast(`🎉 Level up ! Tu es maintenant ${newRang.label}`, 'levelup');
  }
}

let _regCurrentStep = 1;
window.regNextStep = function(nextStep) {
  const dir = nextStep > _regCurrentStep ? 1 : -1;

  if (dir > 0 && _regCurrentStep === 1) {
    const email = document.getElementById('reg-email')?.value.trim();
    const pwd = document.getElementById('reg-pwd')?.value;
    const pseudo = document.getElementById('reg-pseudo')?.value.trim();
    const errEl = document.getElementById('auth-error');

    if (errEl) errEl.textContent = '';
  }
  const curr = document.getElementById('reg-step-' + _regCurrentStep);
  const next = document.getElementById('reg-step-' + nextStep);
  if (!curr || !next) return;
  curr.style.display = 'none';
  next.style.display = 'block';
  next.classList.remove('slide-in-r', 'slide-in-l');
  void next.offsetWidth;
  next.classList.add(dir > 0 ? 'slide-in-r' : 'slide-in-l');
  // Init step 2 grids
  if (nextStep === 2) {
    setTimeout(() => {
      renderClubGrid('reg-club-grid', 'reg-equipe', document.getElementById('reg-equipe').value || 'PSG');
      renderPosteGrid('reg-poste-grid', 'reg-poste', document.getElementById('reg-poste').value || 'attaquant');

  // Init step 3 sliders + FUT preview
  if (nextStep === 3) {
    setTimeout(() => {
      document.querySelectorAll('.reg-stat-slider').forEach(r => updateGreenSliderGradient(r));
      updateRegFutCard();
    }, 30);
  }
  // Update progress bar
  const pct = { 1: 33, 2: 66, 3: 100 }[nextStep] || 33;
  const fill = document.getElementById('reg-progress-fill');
  if (fill) fill.style.width = pct + '%';
  // Update step labels
  document.querySelectorAll('.rsl').forEach((el, i) => el.classList.toggle('active', i + 1 <= nextStep));
  _regCurrentStep = nextStep;
  navigator.vibrate?.(40);
};

function updateGreenSliderGradient(input) {

  input.style.background = `linear-gradient(90deg, var(--green) ${pct.toFixed(1)}%, rgba(255,255,255,.12) ${pct.toFixed(1)}%)`;
  input.style.boxShadow = `0 0 10px rgba(0,230,118,.${Math.floor(pct/25)+1})`;
}

// Met à jour gradient + tooltip du slider
function updateRangeGradient(input) {
  const min = +input.min || 20;
  const max = +input.max || 99;
  const val = +input.value || 70;
  const pct = ((val - min) / (max - min)) * 100;
  input.style.background = `linear-gradient(90deg, var(--orange) ${pct.toFixed(1)}%, var(--border) ${pct.toFixed(1)}%)`;
  const tooltip = input.parentElement?.querySelector('.s-tooltip');
  if (tooltip) {
    tooltip.textContent = val;
    const thumbW = 22;
    const thumbOffset = (pct / 100) * (input.offsetWidth - thumbW) + thumbW / 2;
    tooltip.style.left = thumbOffset + 'px';
  }
}

function syncAtout(name, val) {
  val = parseInt(val);
  document.getElementById('v-' + name).textContent = val;
  const input = document.getElementById('a-' + name);
  if (input) updateRangeGradient(input);
  const tooltip = document.getElementById('st-' + name);
  if (tooltip) {
    tooltip.textContent = val;
    // Animation pop à chaque mouvement
    tooltip.classList.remove('pop');
    requestAnimationFrame(() => {
      tooltip.classList.add('pop');
      clearTimeout(tooltip._pt);
      tooltip._pt = setTimeout(() => tooltip.classList.remove('pop'), 280);
    });
  }
}

// Retourne { can: bool, reason: string }
async function checkCanCreateMatch(uid) {
  if (!uid) return { can: false, reason: 'Non connecté' };
  try {
    const q = query(collection(db, 'matchs'), where('statut', 'in', ['sondage', 'confirmé']));
    const snap = await getDocs(q);
    for (const d of snap.docs) {
      const titulaires = (d.data().joueursInscrits || []).slice(0, 10);
      if (titulaires.includes(uid)) {
        return { can: false, reason: 'Tu es déjà titulaire dans un match actif.' };
      }
    }
    return { can: true };
  } catch {
    return { can: true }; // fail open : en cas d'erreur réseau on laisse passer
  }
}

function calcOverall(d) {
  if (!d) return 70;
  const a = d.atouts || {};

    (a.frappe||70)*0.25 + (a.defense||70)*0.15 +
    (a.physique||70)*0.15 + pas*0.1);

// ===== FORMAT DATE =====
function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' })
    + ' à ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}
function formatDateShort(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

// Retourne les initiales d'un pseudo
function initiales(pseudo) {
  if (!pseudo) return '?';
  return pseudo.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, r = d => d * Math.PI / 180;
  const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
  return +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

async function renderHome() {

  const snapC = await getDocsFromServer(qConfirme).catch(() => getDocs(qConfirme).catch(() => null));

  const qSondage = query(collection(db, 'matchs'), where('statut', '==', 'sondage'));
  const snapS = await getDocsFromServer(qSondage).catch(() => getDocs(qSondage).catch(() => null));

  let html = '';

  // Prochain match confirmé — tri côté client par dateFinale asc, futurs seulement
  const confirmes = snapC ? snapC.docs
    .filter(d => {
      const dFin = d.data().dateFinale;
      if (!dFin) return false;
      return (dFin.toDate ? dFin.toDate() : new Date(dFin)) > new Date();
    })
    .sort((a, b) => {
      const ta = a.data().dateFinale?.toMillis?.() ?? 0;
      const tb = b.data().dateFinale?.toMillis?.() ?? 0;
      return ta - tb;
    }) : [];

  if (confirmes.length > 0) {
    const m = confirmes[0].data();
    const joueursCount = (m.joueursInscrits || []).length;
    html += `
      <div class="hero-match card-hover" onclick="openMatchDetail('${confirmes[0].id}')">
        <div class="hero-label">⚽ Prochain match confirmé</div>
        <div class="hero-date">${formatDate(m.dateFinale)}</div>
        <div class="hero-lieu">📍 ${m.lieuFinal || 'Lieu à définir'}</div>
        <div class="hero-players">
          <div class="player-avatars" id="home-avatars-${confirmes[0].id}"></div>
          <div class="player-count">${joueursCount} joueur${joueursCount>1?'s':''} inscrit${joueursCount>1?'s':''}</div>
        </div>
      </div>`;
    // Charger avatars async
    renderAvatarsAsync(confirmes[0].id, m.joueursInscrits || [], 'home-avatars-' + confirmes[0].id);
  }

  // Sondages — tri côté client par createdAt desc
  const sondages = snapS ? snapS.docs.slice().sort((a, b) => {
    const ta = a.data().createdAt?.toMillis?.() ?? 0;
    const tb = b.data().createdAt?.toMillis?.() ?? 0;
    return tb - ta;
  }) : [];
  if (sondages.length > 0) {
    html += `<div class="section-title">🗳️ Sondages en cours <span class="badge-dot">${sondages.length}</span></div>`;
    for (const d of sondages.slice(0, 3)) {
      const m = d.data();
      const votes = m.votes || {};
      const bestCreneau = getBestCreneau(m);
      html += `
        <div class="poll-card" onclick="openMatchDetail('${d.id}')">
          <div class="poll-card-header">
            <div>
              <div class="poll-card-title">Match du ${m.creneauxProposes && m.creneauxProposes.length > 0 ? formatDateShort(m.creneauxProposes[0].date) : '?'}</div>
              <div class="poll-card-sub">${m.creneauxProposes ? m.creneauxProposes.length : 0} créneaux proposés</div>
            </div>
            <span class="tag tag-sondage">Sondage</span>
          </div>
          <div class="poll-creneaux">
            ${(m.creneauxProposes || []).slice(0, 2).map(c => {
              const voteCount = (votes[c.id] || []).length;
              const hasVoted = (votes[c.id] || []).includes(currentUser?.uid);
              return `<div class="creneau-preview">
                <span>${formatDateShort(c.date)} – ${c.lieu}</span>
                <span class="votes">${voteCount} vote${voteCount>1?'s':''}${hasVoted?' ✓':''}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }
  }

  if (!confirmes.length && !sondages.length) {
    html += `
      <div class="empty-state">
        <div class="icon">⚽</div>
        <p>Aucun match en cours.<br>Sois le premier à en proposer un !</p>
      </div>`;
  }

  // Règle Métier : vérifier l'éligibilité à créer un match
  const eligibility = await checkCanCreateMatch(currentUser?.uid);
  window._canCreateMatch = eligibility;

  if (eligibility.can) {
    html += `<div style="margin-top:16px">
      <button class="btn-primary" onclick="openCreateMatch()">+ PROPOSER UN MATCH</button>
    </div>`;
  } else {
    html += `<div style="margin-top:16px">

      </div>
    </div>`;
  }

  el.innerHTML = html;
}

function getBestCreneau(match) {
  const votes = match.votes || {};
  const creneaux = match.creneauxProposes || [];
  let best = null, max = -1;
  creneaux.forEach(c => {
    const n = (votes[c.id] || []).length;
    if (n > max) { max = n; best = c; }
  });
  return best;
}
