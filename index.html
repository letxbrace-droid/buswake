function loadMatchsList(filter) {
  const el = document.getElementById('matchs-list');
  if (!el) return;
  // Nettoyer l'ancien listener de cette liste
  if (window._matchsListenerUnsubscribe) {
    window._matchsListenerUnsubscribe();
    window._matchsListenerUnsubscribe = null;
  }
  const statutMap = { sondage: 'sondage', confirme: 'confirmé', termine: 'terminé' };
  const statut = statutMap[filter];
  // Pas de orderBy ici — évite l'index composite requis par Firestore.
  // On trie côté client après réception.
  const q = query(collection(db, 'matchs'), where('statut', '==', statut));
  const unsub = onSnapshot(q, async snap => {
    if (snap.empty) {
      el.innerHTML = `<div class="empty-state"><div class="icon">${filter === 'termine' ? '📜' : '📅'}</div><p>Aucun match ici pour l'instant.</p></div>`;
      return;
    }
    // Tri par date de création décroissante côté client
    const docs = snap.docs.slice().sort((a, b) => {
      const ta = a.data().createdAt?.toMillis?.() ?? 0;
      const tb = b.data().createdAt?.toMillis?.() ?? 0;
      return tb - ta;
    });
    let html = '';
    for (const d of docs) {
      const m = d.data();
      const isInscrit = (m.joueursInscrits || []).includes(currentUser?.uid);
      const votesTotal = Object.values(m.votes || {}).reduce((s, v) => s + v.length, 0);
      const best = getBestCreneau(m);
      let subtitle = '';
      if (statut === 'sondage') subtitle = `${m.creneauxProposes ? m.creneauxProposes.length : 0} créneaux · ${votesTotal} vote${votesTotal > 1 ? 's' : ''}`;
      else if (statut === 'confirmé') subtitle = `${formatDateShort(m.dateFinale)} · ${m.lieuFinal || ''}`;
      else subtitle = `Score: ${m.scoreA ?? '?'} – ${m.scoreB ?? '?'}`;
      html += `
        <div class="match-list-card" onclick="openMatchDetail('${d.id}')">
          <div class="mlc-top">
            <div>
              <div class="mlc-title">${statut === 'confirmé' ? '⚽' : statut === 'sondage' ? '🗳️' : '📋'} Match du ${best ? formatDateShort(best.date) : (m.dateFinale ? formatDateShort(m.dateFinale) : '?')}</div>
              <div class="mlc-sub">${subtitle}</div>
            </div>
            <span class="tag tag-${filter}">${statut}</span>
          </div>
          <div class="mlc-bottom">
            <span style="font-size:18px">${isInscrit ? '✅' : '👤'}</span>
            <span class="mlc-creator">${(m.joueursInscrits || []).length} joueur${(m.joueursInscrits || []).length > 1 ? 's' : ''}</span>
          </div>
        </div>`;
    }
    el.innerHTML = html;
  }, err => {
    console.error('Firestore matchs query error:', err);
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Erreur de chargement.<br><small style="color:var(--red)">${err.code}</small></p></div>`;
  });
  window._matchsListenerUnsubscribe = unsub;
  activeListeners.push(unsub);
}

// ===== DÉTAIL MATCH =====
async function openMatchDetail(matchId) {
  openModal('Chargement…', '<div class="loader"><div class="spinner"></div></div>');
  // Écoute temps réel du match
  const matchRef = doc(db, 'matchs', matchId);
  let firstLoad = true;
  const unsub = onSnapshot(matchRef, async snap => {
    if (!snap.exists()) { window.closeModal(); return; }
    const m = snap.data();
    if (firstLoad) {
      firstLoad = false;
      document.getElementById('modal-title').textContent =
        m.statut === 'sondage' ? '🗳️ Sondage créneau' :
        m.statut === 'confirmé' ? '⚽ Match confirmé' : '📋 Match terminé';
    }
    await renderMatchDetail(matchId, m);
  });
  activeListeners.push(unsub);
  // Nettoyer ce listener quand le modal se ferme
  const origClose = window.closeModal;
  window.closeModal = () => { _matchDetailRenderGen++; unsub(); window.closeModal = origClose; origClose(); };
}
window.openMatchDetail = openMatchDetail;

async function renderMatchDetail(matchId, m) {
  const myGen = _matchDetailRenderGen; // snapshot de génération au démarrage
  const uid = currentUser?.uid;
  const votes = m.votes || {};
  const inscrits = m.joueursInscrits || [];
  const isInscrit = inscrits.includes(uid);
  const isCreateur = m.createurUid === uid;
  const best = getBestCreneau(m);

  // Charger les données complètes des inscrits (pseudo + code postal + coords)
  let inscritsPseudos = {};
  let inscritsFullData = {};
  for (const u of inscrits) {
    if (myGen !== _matchDetailRenderGen) return; // annulé
    const d = await getUserData(u);
    inscritsPseudos[u] = d?.pseudo || 'Joueur';
    inscritsFullData[u] = d || {};
  }

  // Construire la liste triée par distance au terrain
  const venueCoords = m.lieuCoords || null;
  const joueursAvecDist = inscrits.map((u, i) => {
    const d = inscritsFullData[u];
    const dist = (venueCoords && d.domicileLat && d.domicileLon)
      ? haversine(d.domicileLat, d.domicileLon, venueCoords.lat, venueCoords.lon)
      : null;
    return { uid: u, pseudo: inscritsPseudos[u], codePostal: d.codePostal || '', dist, isTitulaire: i < 10 };
  });
  if (venueCoords) {
    joueursAvecDist.sort((a, b) => {
      if (a.dist !== null && b.dist !== null) return a.dist - b.dist;
      return a.dist !== null ? -1 : b.dist !== null ? 1 : 0;
    });
  }

  let html = '';

  // ---- Sondage actif ----
  if (m.statut === 'sondage') {
    html += `<div class="section-sub">Choisis ton/tes créneaux</div>`;
    html += (m.creneauxProposes || []).map(c => {
      const voteCount = (votes[c.id] || []).length;
      const hasVoted = (votes[c.id] || []).includes(uid);
      const isTop = best && c.id === best.id && voteCount > 0;
      return `
        <div class="creneau-vote${hasVoted ? ' voted' : ''}${isTop ? ' top' : ''}" onclick="voterCreneau('${matchId}','${c.id}')">
          <div class="info">
            <div class="date-str">${formatDate(c.date)}</div>
            <div class="lieu-str">📍 ${c.lieu}${isTop ? ' <strong style="color:var(--green)">· Plus voté</strong>' : ''}</div>
          </div>
          <div class="vote-count">
            <div class="vote-num">${voteCount}</div>
            <div class="vote-label">vote${voteCount>1?'s':''}</div>
          </div>
          ${hasVoted ? '<div class="vote-check">✓</div>' : ''}
        </div>`;
    }).join('');

    if (isCreateur) {
      html += `<div class="divider"></div><div class="section-sub">Actions créateur</div>`;
      if (best) {
        html += `<p style="font-size:13px;color:var(--text-sec);margin-bottom:10px">Créneau le plus voté : <strong style="color:var(--text)">${formatDate(best.date)}</strong> – ${best.lieu}</p>
          <button class="btn-sm btn-green" style="width:100%;margin-bottom:8px" onclick="confirmerMatch('${matchId}','${best.id}')">✅ CONFIRMER CE MATCH</button>`;
      }
      html += `<button class="btn-sm btn-red" style="width:100%;opacity:.7" onclick="annulerMatch('${matchId}')">🗑️ Annuler ce match</button>`;
    }

    html += `<div class="divider"></div>
      <div class="section-sub">Joueurs inscrits (${inscrits.length}/10)${venueCoords ? ' <span style="font-size:10px;color:var(--text-muted);font-weight:400">· triés par distance</span>' : ''}</div>
      ${buildJoueursListHtml(joueursAvecDist)}
      <div class="divider"></div>
      <button class="btn-sm ${isInscrit ? 'btn-outline' : 'btn-orange'}" style="width:100%" onclick="toggleInscription('${matchId}', ${isInscrit})">
        ${isInscrit ? '❌ Me désinscrire' : '✅ M\'inscrire au match'}
      </button>`;
  }

  // ---- Match confirmé ----
  else if (m.statut === 'confirmé') {
    html += `
      <div style="background:var(--card);border:1px solid var(--green);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:11px;color:var(--green);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Créneau confirmé</div>
        <div style="font-size:17px;font-weight:600">${formatDate(m.dateFinale)}</div>
        <div style="font-size:13px;color:var(--text-sec);margin-top:2px">📍 ${m.lieuFinal || '—'}</div>
      </div>`;

    // Équipes
    if (m.equipes && m.equipes.length > 0) {
      html += `<div class="section-sub">Équipes</div>`;
      html += m.equipes.map(eq => `
        <div class="equipe-block" style="border-left-color:${eq.couleur || 'var(--orange)'}">
          <div class="equipe-nom">${eq.logo || '⚽'} ${eq.nom}</div>
          <div class="equipe-joueurs">
            ${(eq.joueurs || []).map(u => `<div class="joueur-chip"><div class="j-avatar" style="background:${eq.couleur||'var(--orange)'}">${initiales(inscritsPseudos[u])}</div>${inscritsPseudos[u]}</div>`).join('')}
          </div>
        </div>`).join('');
    }

    html += `<div class="divider"></div>
      <div class="section-sub">Joueurs inscrits (${inscrits.length}/10)${venueCoords ? ' <span style="font-size:10px;color:var(--text-muted);font-weight:400">· triés par distance</span>' : ''}</div>
      ${buildJoueursListHtml(joueursAvecDist)}
      <div class="divider"></div>
      <button class="btn-sm ${isInscrit ? 'btn-outline' : 'btn-orange'}" style="width:100%;margin-bottom:8px" onclick="toggleInscription('${matchId}', ${isInscrit})">
        ${isInscrit ? '❌ Me désinscrire' : '✅ M\'inscrire au match'}
      </button>`;

    if (isCreateur) {
      const hasTeams = (m.equipes || []).some(eq => (eq.joueurs || []).length > 0);
      const totalAssigned = (m.equipes || []).reduce((s, eq) => s + (eq.joueurs || []).length, 0);
      const MIN_PLAYERS = 4;
      const canStart = hasTeams && totalAssigned >= MIN_PLAYERS;
      html += `
        <button class="btn-sm btn-outline" style="width:100%;margin-bottom:8px" onclick="openComposerEquipes('${matchId}')">🎨 Composer les équipes</button>`;
      if (canStart) {
        html += `<button class="btn-sm btn-red" style="width:100%;margin-bottom:8px" onclick="openTerminerMatch('${matchId}')">🏁 Terminer le match</button>`;
      } else {
        html += `<div style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:#FFAA00;text-align:center;margin-bottom:8px">
          ⚠️ Compose les équipes avant de pouvoir démarrer le match (min. ${MIN_PLAYERS} joueurs assignés)
        </div>`;
      }
      html += `<button class="btn-sm" style="width:100%;opacity:.6;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text-sec);background:transparent;cursor:pointer" onclick="annulerMatch('${matchId}')">🗑️ Annuler ce match</button>`;
    }
  }

  // ---- Match terminé ----
  else if (m.statut === 'terminé') {
    html += `
      <div class="score-display">
        <div class="score-team">
          <div class="score-num">${m.scoreA ?? '?'}</div>
          <div class="score-name">${m.equipes?.[0]?.nom || 'Équipe A'}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-team">
          <div class="score-num">${m.scoreB ?? '?'}</div>
          <div class="score-name">${m.equipes?.[1]?.nom || 'Équipe B'}</div>
        </div>
      </div>`;

    if (m.hommeDuMatchUid) {
      const hdmData = await getUserData(m.hommeDuMatchUid);
      html += `
        <div style="background:rgba(243,156,18,.1);border:1px solid var(--gold);border-radius:12px;padding:12px;text-align:center;margin-bottom:14px">
          <div style="font-size:11px;color:var(--gold);font-weight:600;letter-spacing:1px">🏆 HOMME DU MATCH</div>
          <div style="font-size:20px;font-family:Oswald;font-weight:700;margin-top:4px">${hdmData?.pseudo || 'Inconnu'}</div>
        </div>`;
    }

    if (m.equipes && m.equipes.length > 0) {
      html += `<div class="section-sub">Équipes</div>`;
      html += m.equipes.map(eq => `
        <div class="equipe-block" style="border-left-color:${eq.couleur || 'var(--orange)'}">
          <div class="equipe-nom">${eq.logo || '⚽'} ${eq.nom}</div>
          <div class="equipe-joueurs">
            ${(eq.joueurs || []).map(u => `<div class="joueur-chip">${inscritsPseudos[u]}</div>`).join('')}
          </div>
        </div>`).join('');
    }
  }

  if (myGen !== _matchDetailRenderGen) return; // annulé entre temps
  document.getElementById('modal-body').innerHTML = html;
}

// ===== VOTE CRÉNEAU =====
async function voterCreneau(matchId, creneauId) {
  if (!currentUser) return;
  const uid = currentUser.uid;
  const ref = doc(db, 'matchs', matchId);
  const snap = await getDoc(ref);
  const votes = snap.data().votes || {};
  const crVotes = votes[creneauId] || [];
  const hasVoted = crVotes.includes(uid);
  const update = {};
  if (hasVoted) {
    update[`votes.${creneauId}`] = arrayRemove(uid);
  } else {
    update[`votes.${creneauId}`] = arrayUnion(uid);
    await addXP(uid, XP.voter);
    showToast('+10 XP pour ton vote !', 'success');
  }
  await updateDoc(ref, update);
}
window.voterCreneau = voterCreneau;

// ===== INSCRIPTION MATCH =====
async function _doJoinMatch(matchId) {
  const uid = currentUser.uid;
  await updateDoc(doc(db, 'matchs', matchId), { joueursInscrits: arrayUnion(uid) });
  showToast('Tu es inscrit ! 🎉', 'success');
  checkCanCreateMatch(uid).then(r => { window._canCreateMatch = r; });
}

async function toggleInscription(matchId, isInscrit) {
  if (!currentUser) return;
  const uid = currentUser.uid;
  if (isInscrit) {
    await updateDoc(doc(db, 'matchs', matchId), { joueursInscrits: arrayRemove(uid) });
    showToast('Tu t\'es désinscrit du match.', '');
    checkCanCreateMatch(uid).then(r => { window._canCreateMatch = r; });
    return;
  }
  // Vérifier si code postal renseigné
  const ud = await getUserData(uid);
  if (!ud?.codePostal) {
    openModal('📍 Ton code postal', `
      <p style="font-size:14px;color:var(--text-sec);margin-bottom:14px;line-height:1.5">
        Renseigne ton code postal pour que les autres joueurs voient<br>
        ta distance jusqu'au terrain.
      </p>
      <input class="input-field" type="tel" id="cp-join-input"
        placeholder="Ex : 91130" maxlength="5"
        style="margin-bottom:14px;font-size:16px;letter-spacing:3px;text-align:center"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-outline" style="flex:1"
          onclick="window._skipCpJoin('${matchId}')">Passer</button>
        <button class="btn-sm btn-orange" style="flex:1"
          onclick="window._saveCpJoin('${matchId}')">S'inscrire</button>
      </div>`);
    return;
  }
  await _doJoinMatch(matchId);
}
window.toggleInscription = toggleInscription;

window._skipCpJoin = async function(matchId) {
  window.closeModal();
  await _doJoinMatch(matchId);
};
window._saveCpJoin = async function(matchId) {
  const cp = document.getElementById('cp-join-input')?.value.trim();
  if (cp && /^\d{5}$/.test(cp)) {
    try {
      const geo = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${cp}&country=fr&format=json`).then(r=>r.json());
      const coords = geo[0] ? { domicileLat: +geo[0].lat, domicileLon: +geo[0].lon } : {};
      await updateDoc(doc(db, 'users', currentUser.uid), { codePostal: cp, ...coords });
      delete usersCache[currentUser.uid];
    } catch {}
  }
  window.closeModal();
  await _doJoinMatch(matchId);
};

async function confirmerMatch(matchId, creneauId) {
  const ref = doc(db, 'matchs', matchId);
  const snap = await getDoc(ref);
  const m = snap.data();
  const creneau = (m.creneauxProposes || []).find(c => c.id === creneauId);
  if (!creneau) return;
  await updateDoc(ref, {
    statut: 'confirmé',
    dateFinale: creneau.date,
    lieuFinal: creneau.lieu,
  });
  showToast('Match confirmé ! ⚽', 'success');
}

// ===== CARTE SÉLECTION LIEU (Leaflet + Overpass + Geolocalisation + Recherche ville) =====
let _venueMap = null;
window.openVenueMap = function(inputId) {
  const inputEl = document.getElementById(inputId);
  openModal('📍 Choisir un terrain', `
    <input class="input-field" id="venue-search-input"
      placeholder="🔍 Cherche une ville : Orsay, Massy, Paris 13e…"
      style="margin-bottom:10px">
    <div class="venue-map-wrap">
      <div id="venue-map"></div>
    </div>
    <div id="venue-list" class="venue-list">
      <div class="venue-item"><div class="vi-name">📡 Géolocalisation en cours…</div></div>
    </div>
    <div class="map-or-manual">— ou saisie manuelle —</div>
    <input class="input-field" id="venue-manual-input" placeholder="Nom du terrain / adresse…"
      value="${inputEl?.value || ''}" style="margin-bottom:10px">
    <button class="btn-primary" onclick="confirmVenueSelection('${inputId}')">
      CONFIRMER CE LIEU
    </button>
  `);

  requestAnimationFrame(() => {
    setTimeout(() => {
      if (_venueMap) { _venueMap.remove(); _venueMap = null; }
      const map = L.map('venue-map', { zoomControl:true }).setView([48.8566, 2.3522], 12);
      _venueMap = map;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:'© OpenStreetMap', maxZoom:19
      }).addTo(map);

      function queryVenuesAround(lat, lon, zoom) {
        map.setView([lat, lon], zoom || 13);
        // Clear markers
        map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });

        const d = 0.12;
        const bb = `${lat-d},${lon-d*1.8},${lat+d},${lon+d*1.8}`;
        // Only commercial indoor 5-a-side / futsal venues — no clubs or public complexes
        const oq = `[out:json][timeout:15];(
          node["name"~"five|futsal|urban soccer|urban foot|foot five|speed soccer|city stade|footeo|urbain foot|mini foot indoor",i](${bb});
          way["name"~"five|futsal|urban soccer|urban foot|foot five|speed soccer|city stade|footeo|urbain foot|mini foot indoor",i](${bb});
          node["sport"="futsal"](${bb});
          way["sport"="futsal"](${bb});
          node["sport"="soccer"]["indoor"="yes"](${bb});
          way["sport"="soccer"]["indoor"="yes"](${bb});
        );out center 30;`;

        const listEl = document.getElementById('venue-list');
        if (listEl) listEl.innerHTML = '<div class="venue-item"><div class="vi-name">⏳ Chargement des terrains…</div></div>';

        fetch('https://overpass-api.de/api/interpreter', {
          method:'POST', body:'data=' + encodeURIComponent(oq)
        })
        .then(r => r.json())
        .then(data => {
          const INDOOR_KW = ['five','futsal','urban','indoor','speed soccer','city stade','footeo','mini foot'];
          const EXCL_KW  = ['club sportif','association','complexe sportif','stade municipal','gymnase','lycée','collège','école','mairie','omnisports'];
          const venues = (data.elements || [])
            .filter(e => {
              if (!e.tags?.name) return false;
              const n = e.tags.name.toLowerCase();
              // Must match an indoor keyword OR have sport=futsal tag
              const isIndoor = INDOOR_KW.some(k => n.includes(k)) || e.tags?.sport === 'futsal' || e.tags?.indoor === 'yes';
              const isExcl   = EXCL_KW.some(k => n.includes(k));
              return isIndoor && !isExcl;
            })
            .map(e => ({
              name: e.tags.name,
              lat: e.lat ?? e.center?.lat,
              lon: e.lon ?? e.center?.lon,
              addr: [e.tags['addr:street'], e.tags['addr:housenumber'], e.tags['addr:city']].filter(Boolean).join(' ')
            }))
            .filter(v => v.lat && v.lon);

          const lEl = document.getElementById('venue-list');
          if (!lEl) return;
          if (venues.length === 0) {
            lEl.innerHTML = '<div class="venue-item"><div class="vi-name">Aucun terrain Five/Futsal/Urban trouvé près d\'ici — recherche une ville ou saisis le nom manuellement</div></div>';
            return;
          }
          window._venueResults = venues;
          lEl.innerHTML = venues.slice(0,25).map((v,i) => `
            <div class="venue-item" id="vi-${i}" onclick="selectVenueItem(${i})">
              <div class="vi-name">${v.name}</div>
              <div class="vi-dist">${v.addr || '📍 ' + v.lat.toFixed(4) + ', ' + v.lon.toFixed(4)}</div>
            </div>`).join('');

          const icon = L.divIcon({ html:'⚽', className:'', iconSize:[22,22] });
          venues.slice(0,25).forEach((v,i) => {
            L.marker([v.lat, v.lon], { icon })
              .addTo(map)
              .bindPopup(`<b>${v.name}</b><br>${v.addr || ''}`)
              .on('click', () => selectVenueItem(i));
          });
        })
        .catch(() => {
          const lEl = document.getElementById('venue-list');
          if (lEl) lEl.innerHTML = '<div class="venue-item"><div class="vi-name">Erreur réseau — saisis l\'adresse manuellement.</div></div>';
        });
      }
      window._queryVenuesAround = queryVenuesAround;

      // 1. Géolocalisation GPS
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => queryVenuesAround(pos.coords.latitude, pos.coords.longitude, 13),
          ()  => queryVenuesAround(48.8566, 2.3522, 12),
          { timeout: 6000 }
        );
      } else {
        queryVenuesAround(48.8566, 2.3522, 12);
      }

      // 2. Recherche par nom de ville (Nominatim)
      let searchTimer = null;
      const searchEl = document.getElementById('venue-search-input');
      if (searchEl) {
        searchEl.addEventListener('input', function() {
          clearTimeout(searchTimer);
          const q = this.value.trim();
          if (q.length < 3) return;
          searchTimer = setTimeout(async () => {
            try {
              const r = await fetch(
                `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=fr`,
                { headers: { 'Accept-Language':'fr', 'User-Agent':'CapSaclayFive/1.0' } }
              );
              const res = await r.json();
              if (res.length > 0) queryVenuesAround(parseFloat(res[0].lat), parseFloat(res[0].lon), 13);
            } catch(e) {}
          }, 650);
        });
      }
    }, 120);
  });
};

function autoBalanceTeams() {
  const inscrits = window._composerInscrits || [];
  const playersData = window._composerPlayersData || {};
  const sorted = [...inscrits].sort((a, b) => calcOverall(playersData[b]) - calcOverall(playersData[a]));
  eqData[0].joueurs = [];
  eqData[1].joueurs = [];
  sorted.slice(0, 10).forEach((uid, i) => {
    // Snake draft: round 0 → A,B; round 1 → B,A; round 2 → A,B…
    const round = Math.floor(i / 2);
    const inRound = i % 2;
    const toA = round % 2 === 0 ? inRound === 0 : inRound === 1;
    eqData[toA ? 0 : 1].joueurs.push(uid);
  });
  renderTerrainView();
}

function initTerrainDnD() {
  let draggingUid = null;
  let ghost = null;
  let sourceZone = null;

  document.querySelectorAll('#modal-body .mini-card').forEach(card => {
    card.addEventListener('pointerdown', e => {
      if (e.button !== undefined && e.button > 0) return;
      e.preventDefault();
      draggingUid = card.dataset.uid;
      const zone = card.closest('.drop-zone');
      sourceZone = zone ? parseInt(zone.dataset.zone) : -1;

      const rect = card.getBoundingClientRect();
      ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position:'fixed', zIndex:'9999', pointerEvents:'none',
        opacity:'0.88', transform:'scale(1.15) rotate(4deg)',
        transition:'none', borderRadius:'7px',
        boxShadow:'0 8px 28px rgba(0,0,0,.6)',
        width: rect.width + 'px',
        left: rect.left + 'px', top: rect.top + 'px'
      });
      document.body.appendChild(ghost);
      card.classList.add('dragging');
      card.setPointerCapture(e.pointerId);
    });

    card.addEventListener('pointermove', e => {
      if (!ghost) return;
      e.preventDefault();
      ghost.style.left = (e.clientX - 27) + 'px';
      ghost.style.top  = (e.clientY - 40) + 'px';
      document.querySelectorAll('.drop-zone').forEach(z => {
        const r = z.getBoundingClientRect();
        z.classList.toggle('drag-over',
          e.clientX >= r.left && e.clientX <= r.right &&
          e.clientY >= r.top  && e.clientY <= r.bottom);
      });
    });

    const finishDrag = (e) => {
      if (!draggingUid) return;
      if (ghost) { ghost.remove(); ghost = null; }
      card.classList.remove('dragging');

      let dropped = false;
      document.querySelectorAll('.drop-zone').forEach(z => {
        const r = z.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right &&
                     e.clientY >= r.top  && e.clientY <= r.bottom;
        z.classList.remove('drag-over');
        if (over) {
          const zoneIdx = parseInt(z.dataset.zone);
          if (zoneIdx !== sourceZone) {
            // Remove from all teams, add to target
            eqData.forEach((eq, i) => { eq.joueurs = eq.joueurs.filter(u => u !== draggingUid); });
            if (zoneIdx >= 0) eqData[zoneIdx].joueurs.push(draggingUid);
            dropped = true;
          }
        }
      });
      if (dropped) renderTerrainView();
      draggingUid = null;
    };
    card.addEventListener('pointerup',     finishDrag);
    card.addEventListener('pointercancel', () => {
      if (ghost) { ghost.remove(); ghost = null; }
      card.classList.remove('dragging');
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      draggingUid = null;
    });
  });
}

    { key: 'physique', label: 'Physique' },
  ];

  const badgesHtml = BADGES_DEF.map(b => {
    const unlocked = (d.badges || []).includes(b.id);
    return `<div class="badge-item ${unlocked ? 'unlocked' : 'locked'}">
      <div class="b-icon">${b.icon}</div>
      <div class="b-name">${b.name}</div>
    </div>`;
  }).join('');

  // ===== FUT CARD V3 =====
  const atoutsMap = { vitesse:'PAC', dribble:'DRI', frappe:'TIR', defense:'DEF', physique:'PHY' };
  const pas = Math.round(((d.atouts?.vitesse||70) + (d.atouts?.dribble||70)) / 2);
  const statsOrder = ['vitesse','dribble','frappe','defense','physique'];
  const noteGlobal = Math.round(
    ((d.atouts?.vitesse||70)*0.15 + (d.atouts?.dribble||70)*0.2 +
     (d.atouts?.frappe||70)*0.25 + (d.atouts?.defense||70)*0.15 +
     (d.atouts?.physique||70)*0.15 + pas*0.1)
  );
  const savedPhoto = localStorage.getItem('cs5_photo_' + uid);
  const photoHtml = savedPhoto
    ? `<img src="${savedPhoto}" class="fc3-photo" alt="photo">`
    : `<div class="fc3-photo-placeholder">👤</div>`;

  const futHtml = `
  <div class="fut-card-wrap">
    <div class="fut-card-v3 ${noteGlobal >= 80 ? 'rare' : ''}">
      <div class="fc3-top">
        <div class="fc3-meta">
          <div class="fc3-overall">${noteGlobal}</div>
          <div class="fc3-pos">${posteLabel}</div>
          <div class="fc3-badge-row">
            ${clubShield(d.equipePreferee || 'PSG', 22)}
          </div>
        </div>
        <div class="fc3-photo-zone">${photoHtml}</div>
        <label class="fc3-upload-btn" for="fc-photo-input">📷 Photo</label>
        <input type="file" id="fc-photo-input" accept="image/*"
          style="display:none" onchange="uploadFcPhoto(this)">
      </div>
      <div class="fc3-bottom">
        <div class="fc3-name">${(d.pseudo || 'JOUEUR').toUpperCase()}</div>
        <div class="fc3-divider"></div>
        <div class="fc3-stats">
          ${statsOrder.map(k => `
            <div class="fc3-stat">
              <span class="sn">${d.atouts?.[k] || 70}</span>
              <span class="sl">${atoutsMap[k]}</span>
            </div>`).join('')}
          <div class="fc3-stat">
            <span class="sn">${pas}</span>
            <span class="sl">PAS</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  el.innerHTML = `
    <div class="rank-badge">${rang.label} · ${d.xp || 0} XP${d.codePostal ? ` · 📍 ${d.codePostal}` : ''}</div>

    ${futHtml}

    <div class="stats-row">
      <div class="stat-box"><div class="sv">${d.stats?.matchsJoues ?? 0}</div><div class="sl">Matchs joués</div></div>
      <div class="stat-box"><div class="sv">${d.stats?.victoires ?? 0}</div><div class="sl">Victoires</div></div>
      <div class="stat-box"><div class="sv">${d.stats?.hommeDuMatch ?? 0}</div><div class="sl">Homme du match</div></div>
    </div>

    <div class="section-title" style="margin-top:8px">Atouts</div>
    ${atoutsOrder.map(a => {
      const val = d.atouts?.[a.key] ?? 70;
      return `<div class="atout-bar-wrap">
        <div class="atout-bar-label"><span>${a.label}</span><span>${val}</span></div>
        <div class="atout-bar-bg"><div class="atout-bar-fill" style="width:${val}%"></div></div>
      </div>`;
    }).join('')}

    <div class="section-title" style="margin-top:16px">Badges</div>
    <div class="badges-grid">${badgesHtml}</div>

    <div class="divider"></div>
    <button class="edit-profile-btn" onclick="openEditProfile()">✏️ Modifier mon profil</button>
  `;

  document.getElementById('top-xp-badge').textContent = `${d.xp || 0} XP`;
}

// ===== ÉDITER PROFIL =====
function openEditProfile() {
  const d = currentUserData;
  if (!d) return;
  const atoutsOrder = ['vitesse','dribble','frappe','defense','physique'];
  const atoutsIcons = { vitesse:'⚡', dribble:'🎭', frappe:'💥', defense:'🛡️', physique:'💪' };
  openModal('✏️ Modifier mon profil', `
    <div class="form-group">
      <label class="input-label">Pseudo</label>
      <input class="input-field" id="ep-pseudo" value="${d.pseudo || ''}">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="input-label">Code postal <span style="font-weight:400;opacity:.6">(distance au terrain)</span></label>
      <input class="input-field" type="tel" id="ep-cp" value="${d.codePostal || ''}" placeholder="Ex : 91130" maxlength="5" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="input-label">Équipe préférée</label>
      <input type="hidden" id="ep-equipe" value="${d.equipePreferee || 'PSG'}">
      <div class="club-scroll" id="ep-club-grid"></div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="input-label">Poste</label>
      <input type="hidden" id="ep-poste" value="${d.posteFavori || 'milieu'}">
      <div class="poste-grid" id="ep-poste-grid"></div>
    </div>
    <div style="margin-top:16px">
      <label class="input-label">Atouts</label>
      ${atoutsOrder.map(a => {
        const val = d.atouts?.[a] ?? 70;
        const pct = ((val-20)/(99-20))*100;
        return `<div class="atout-item form-group" style="margin-top:10px">
          <label style="display:flex;justify-content:space-between;align-items:center">
            <span>${atoutsIcons[a] || ''} <span style="text-transform:capitalize">${a}</span></span>
            <span id="epv-${a}" style="color:var(--orange);font-weight:700;font-family:Oswald,sans-serif;font-size:16px">${val}</span>
          </label>
          <div class="slider-wrap">
            <div class="s-tooltip" id="epst-${a}" style="left:calc(${pct}% + ${10-pct*.2}px)">${val}</div>
            <input type="range" min="20" max="99" value="${val}" id="epa-${a}"
              style="background:linear-gradient(90deg,var(--orange) ${pct}%,var(--border) ${pct}%)"
              oninput="(function(el){
                document.getElementById('epv-${a}').textContent=el.value;
                updateRangeGradient(el);
              })(this)">
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-primary" style="margin-top:20px" onclick="saveProfile()">ENREGISTRER</button>`);
  // Rend les grilles après injection HTML
  setTimeout(() => {
    renderClubGrid('ep-club-grid', 'ep-equipe', d.equipePreferee || 'PSG');
    renderPosteGrid('ep-poste-grid', 'ep-poste', d.posteFavori || 'milieu');
  }, 30);
}
window.openEditProfile = openEditProfile;

window.saveProfile = async function() {
  if (!currentUser) return;
  const atoutsOrder = ['vitesse','dribble','frappe','defense','physique'];
  const atouts = {};
  atoutsOrder.forEach(a => { atouts[a] = +document.getElementById('epa-' + a).value; });
  const newCp = document.getElementById('ep-cp')?.value.trim() || '';
  let cpCoords = {};
  if (/^\d{5}$/.test(newCp) && newCp !== (currentUserData?.codePostal || '')) {
    try {
      const geo = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${newCp}&country=fr&format=json`).then(r=>r.json());
      if (geo[0]) cpCoords = { domicileLat: +geo[0].lat, domicileLon: +geo[0].lon };
    } catch {}
  }
  await updateDoc(doc(db, 'users', currentUser.uid), {
    pseudo: document.getElementById('ep-pseudo').value.trim(),
    equipePreferee: document.getElementById('ep-equipe').value,
    posteFavori: document.getElementById('ep-poste').value,
    atouts,
    codePostal: newCp || deleteField(),
    ...cpCoords,
  });
  delete usersCache[currentUser.uid];
  showToast('Profil mis à jour ! ✅', 'success');
  window.closeModal();
  renderProfil();
};

// ===== CLASSEMENT =====
async function renderClassement() {
  const el = document.getElementById('classement-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  const q = query(collection(db, 'users'), orderBy('xp', 'desc'));
  const snap = await getDocs(q);
  const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  if (users.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>Aucun joueur encore inscrit.</p></div>';
    return;
  }

  const top3 = users.slice(0, 3);
  const rest = users.slice(3);

  // Podium
  let podiumHtml = '<div class="podium">';
  const podiumOrder = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;
  const podiumClass = ['podium-2', 'podium-1', 'podium-3'];
  const podiumLabel = ['2', '1', '3'];
  podiumOrder.forEach((u, i) => {
    const isMe = u.id === currentUser?.uid;
    const rang = getRang(u.xp || 0);
    podiumHtml += `
      <div class="podium-item ${podiumClass[i]}">
        <div class="podium-avatar${isMe ? '" style="border:2px solid var(--orange)' : ''}">${initiales(u.pseudo)}</div>
        <div class="podium-name">${u.pseudo}${isMe ? ' 👋' : ''}</div>
        <div class="podium-xp">${u.xp || 0} XP</div>
        <div class="podium-block">${podiumLabel[i]}</div>
      </div>`;
  });
  podiumHtml += '</div>';

  // Liste
  let listHtml = '<div class="leaderboard-list">';
  users.forEach((u, i) => {
    const isMe = u.id === currentUser?.uid;
    const rang = getRang(u.xp || 0);
    const rankColor = i === 0 ? 'var(--gold)' : i === 1 ? 'var(--silver)' : i === 2 ? 'var(--bronze)' : 'var(--text-muted)';
    listHtml += `
      <div class="lb-item${isMe ? ' me' : ''}">
        <div class="lb-rank" style="color:${rankColor}">${i + 1}</div>
        <div class="lb-avatar">${initiales(u.pseudo)}</div>
        <div class="lb-info">
          <div class="lb-pseudo">${u.pseudo}${isMe ? ' 👋' : ''}</div>
          <div class="lb-detail">${rang.label} · ${u.stats?.matchsJoues ?? 0} matchs · ${u.stats?.hommeDuMatch ?? 0} 🏆</div>
        </div>
        <div class="lb-xp">${u.xp || 0} XP</div>
      </div>`;
  });
  listHtml += '</div>';

  el.innerHTML = `
    <div class="section-title">🏆 Classement XP</div>
    ${podiumHtml}
    <div class="section-title" style="margin-top:4px">Tous les joueurs</div>
    ${listHtml}`;
}

// ===== AUTH STATE =====
// Appliquer le thème sauvegardé dès le départ
applyTheme(currentTheme);

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-screen').classList.add('hidden');
  if (user) {
    currentUser = user;
    // Charger les données utilisateur
    const snap = await getDoc(doc(db, 'users', user.uid));
    currentUserData = snap.exists() ? snap.data() : null;
    // Mettre à jour le badge XP dans la topbar
    if (currentUserData) {
      document.getElementById('top-xp-badge').textContent = `${currentUserData.xp || 0} XP`;
    }
    // Afficher l'app + points de thème
    document.getElementById('auth-wrap').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderThemeDots();
    renderHome();
  } else {
    currentUser = null;
    currentUserData = null;
    cleanupListeners();
    document.getElementById('app').classList.add('hidden');
    document.getElementById('auth-wrap').classList.remove('hidden');
  }
});

// Écoute temps réel de l'utilisateur courant (pour XP live)
onAuthStateChanged(auth, (user) => {
  if (user) {
    const unsub = onSnapshot(doc(db, 'users', user.uid), (snap) => {
      if (snap.exists()) {
        currentUserData = snap.data();
        document.getElementById('top-xp-badge').textContent = `${currentUserData.xp || 0} XP`;
      }
    });
    activeListeners.push(unsub);
  }
});

// ===== TOUCH SWIPE sur les modals =====
let startY = 0;
document.getElementById('modal-sheet').addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
document.getElementById('modal-sheet').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - startY;
  if (dy > 80) closeModal();
}, { passive: true });

</script>
